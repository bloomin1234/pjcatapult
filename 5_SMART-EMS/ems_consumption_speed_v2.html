<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart-EMS｜在庫消化スピード ファンチャート（プロトタイプ v2）</title>
<style>
  :root{
    --ink:#1C1C1A;
    --green:#0F5132;   /* B：安定消化 */
    --red:#C0392B;     /* A：高速消化＝要補充 */
    --amber:#B97F23;   /* C：滞留・入庫超過 */
    --panel:#FFFFFF;
    --bg:#F5F5F4;
    --line:#D9D9D9;
    --sub:#6B6B66;
  }
  *{box-sizing:border-box; border-radius:0 !important;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    font-size:14px; line-height:1.6;
  }
  .wrap{max-width:1360px; margin:0 auto; padding:24px;}

  .head{display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:14px;}
  h1{font-size:22px; margin:0; letter-spacing:.02em;}
  .head .desc{color:var(--sub); font-size:12px; margin-top:4px;}

  /* トグル（金額/在庫比） */
  .switch{display:flex; border:1px solid var(--ink);}
  .switch button{
    appearance:none; border:none; background:#fff; color:var(--ink);
    padding:7px 16px; font-size:13px; font-weight:600; cursor:pointer;
    border-left:1px solid var(--ink);
  }
  .switch button:first-child{border-left:none;}
  .switch button.on{background:var(--ink); color:#fff;}

  /* A/B/C フィルタチップ */
  .chips{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
  .chip{
    display:flex; align-items:center; gap:8px; cursor:pointer;
    border:1px solid var(--line); background:#fff; padding:6px 14px; font-size:13px;
  }
  .chip b{color:#fff; font-size:12px; padding:0 8px; font-weight:700;}
  .chip.a b{background:var(--red);} .chip.b b{background:var(--green);} .chip.c b{background:var(--amber);}
  .chip small{color:var(--sub);}
  .chip.off{opacity:.35;}

  .layout{display:grid; grid-template-columns:1fr 300px; gap:16px; align-items:start;}
  @media (max-width:960px){ .layout{grid-template-columns:1fr;} }

  .panel{background:var(--panel); border:1px solid var(--line); padding:20px;}
  .panel h2{font-size:15px; margin:0 0 4px 0;}
  .panel .hint{font-size:12px; color:var(--sub); margin-bottom:12px;}
  #chart svg{width:100%; height:auto; display:block;}

  /* 右側：上下ランキング */
  .side{background:var(--panel); border:1px solid var(--line);}
  .side h3{
    font-size:12px; margin:0; padding:8px 14px; color:#fff; font-weight:700; letter-spacing:.05em;
  }
  .side h3.up{background:var(--amber);} .side h3.down{background:var(--red);}
  .side ul{list-style:none; margin:0; padding:4px 0;}
  .side li{
    display:flex; justify-content:space-between; gap:8px; align-items:baseline;
    padding:4px 14px; font-size:12px; cursor:pointer; border-bottom:1px solid #F0F0EE;
  }
  .side li:hover, .side li.hl{background:#EFEFED;}
  .side li .nm{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .side li .nm b{margin-right:6px;}
  .side li.a .nm b{color:var(--red);} .side li.b .nm b{color:var(--green);} .side li.c .nm b{color:var(--amber);}
  .side li .v{font-variant-numeric:tabular-nums; white-space:nowrap; color:var(--sub);}

  .tooltip{
    position:fixed; z-index:10; background:var(--ink); color:#fff; font-size:12px;
    padding:8px 12px; pointer-events:none; display:none; white-space:nowrap; line-height:1.7;
  }
  .legend{display:flex; gap:18px; font-size:12px; color:var(--sub); margin-top:10px; flex-wrap:wrap;}
  .legend i{display:inline-block; width:14px; height:3px; margin-right:5px; vertical-align:3px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <div>
      <h1>在庫消化スピード（累積増減ファンチャート）</h1>
      <div class="desc">全品目を「期首＝0」の同じスタート地点から描画。下に行くほど消化が速く、上に行くほど在庫が積み上がっている。線の向きだけでA/B/Cが判別できます。</div>
    </div>
    <div class="switch" id="mode">
      <button data-m="amt" class="on">金額</button>
      <button data-m="pct">在庫比（％）</button>
    </div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="layout">
    <div class="panel">
      <h2>期首からの累積増減（直近90日）</h2>
      <div class="hint">線にマウスを乗せると品目名を表示。クリックで固定／再クリックで解除。右のリストからも品目を追えます。</div>
      <div id="chart"></div>
      <div class="legend">
        <span><i style="background:var(--red)"></i>A：急降下＝消化が速い（要補充）</span>
        <span><i style="background:var(--green)"></i>B：ゆるやかに下降＝安定消化</span>
        <span><i style="background:var(--amber)"></i>C：上昇・横ばい＝滞留（入庫超過）</span>
      </div>
    </div>

    <div>
      <div class="side" style="margin-bottom:16px;">
        <h3 class="up">▲ 上に行った品目（積み上がり）</h3>
        <ul id="list-up"></ul>
      </div>
      <div class="side">
        <h3 class="down">▼ 下に行った品目（消化が速い）</h3>
        <ul id="list-down"></ul>
      </div>
    </div>
  </div>

</div>
<div class="tooltip" id="tip"></div>

<script>
/* =====================================================
   ダミーデータ生成
   実装時は EMS の日次「入庫額・出庫額」から
   累積増減 cum[d] = Σ(入庫 − 出庫) を作ればそのまま使える
===================================================== */
let seed = 7;
function rnd(){ seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }

const DAYS = 90;
const skus = [];
const defs = [
  // [名前, タイプ]  A=高速消化 B=安定 C=滞留
  ["キャベツ 1玉","A"],["レタス 結球","A"],["トマト 4kg箱","A"],["きゅうり A品","A"],
  ["ほうれん草 束","A"],["長ねぎ 2L","A"],["なす 秀品","A"],["ピーマン 150g","A"],
  ["玉ねぎ 20kg","B"],["じゃがいも 10kg","B"],["にんじん M","B"],["ごぼう 洗い","B"],
  ["さつまいも 紅はるか","B"],["かぼちゃ 1/4","B"],["大根 L","B"],["白菜 1/2","B"],
  ["れんこん 2kg","B"],["里芋 洗い","B"],
  ["乾しいたけ 業務用","C"],["切干大根 1kg","C"],["高野豆腐 500g","C"],["春雨 業務用","C"],
  ["ごま油 一斗缶","C"],["うずら水煮 缶","C"],["メンマ 塩蔵","C"],["紅生姜 1kg","C"]
];

defs.forEach(([name,type])=>{
  const inflow = [], outflow = [];
  for(let d=0; d<DAYS; d++){
    let inn=0, out=0;
    if(type==="A"){
      if(rnd()<0.22) inn = 3000+rnd()*4000;     // まとめて入荷
      out = 500+rnd()*900;                      // 毎日どんどん出る
    }else if(type==="B"){
      if(rnd()<0.10) inn = 1200+rnd()*1200;
      out = 90+rnd()*110;                       // じわじわ出る
    }else{
      if(d<5 && rnd()<0.6) inn = 2500+rnd()*3000; // 期首にどーんと入荷
      if(rnd()<0.15) inn += 300+rnd()*400;        // その後も入庫が続く
      out = rnd()<0.06 ? 40 : 0;                  // ほぼ出ない
    }
    inflow.push(inn); outflow.push(out);
  }
  // 累積増減（期首=0）
  const cum=[0]; let base=0, stock=2500+rnd()*2500;
  for(let d=0; d<DAYS; d++){ base += inflow[d]-outflow[d]; cum.push(base); }
  skus.push({name, inflow, outflow, cum, startStock:stock});
});

/* =====================================================
   分類ロジック
   ・日次出庫額 = 直近30日の出庫合計 ÷ 30
   ・在庫日数   = 現在庫（期首在庫＋累積増減） ÷ 日次出庫額
   ・A: ≤14日 ／ C: 出庫ほぼゼロ or >60日 ／ B: その他
===================================================== */
skus.forEach(s=>{
  let out30=0;
  for(let d=DAYS-30; d<DAYS; d++) out30 += s.outflow[d];
  const daily = out30/30;
  const cur = Math.max(0, s.startStock + s.cum[DAYS]);
  const days = daily<10 ? Infinity : cur/daily;
  s.daily=Math.round(daily); s.cur=Math.round(cur); s.days=days;
  s.end = s.cum[DAYS];
  s.cls = days<=14 ? "a" : (days>60||!isFinite(days)) ? "c" : "b";
  // 在庫比（％）：期首在庫を100として何％動いたか
  s.cumPct = s.cum.map(v=> v / Math.max(s.startStock,1) * 100);
});

const CLS = {
  a:{label:"A", title:"要補充（高速消化）", color:"#C0392B"},
  b:{label:"B", title:"安定消化", color:"#0F5132"},
  c:{label:"C", title:"滞留（入庫超過）", color:"#B97F23"}
};
const fmt = n => Math.round(n).toLocaleString("ja-JP");
const fmtDays = d => !isFinite(d) ? "出庫なし" : Math.round(d)+"日";
const active = {a:true, b:true, c:true};
let mode = "amt";        // amt=金額 / pct=在庫比
let pinned = null;       // クリック固定中の品目 index
let hovered = null;

/* ---------- フィルタチップ ---------- */
function renderChips(){
  const el = document.getElementById("chips");
  el.innerHTML = ["a","b","c"].map(k=>{
    const n = skus.filter(s=>s.cls===k).length;
    return `<div class="chip ${k} ${active[k]?"":"off"}" data-k="${k}">
      <b>${CLS[k].label}</b>${CLS[k].title}<small>${n}品目</small>
    </div>`;
  }).join("");
  el.querySelectorAll(".chip").forEach(c=>{
    c.onclick=()=>{ active[c.dataset.k]=!active[c.dataset.k]; pinned=null; renderAll(); };
  });
}

/* ---------- ファンチャート ---------- */
function renderChart(){
  const W=1000, H=560, L=80, R=30, T=24, B=44;
  const plotW=W-L-R, plotH=H-T-B;
  const list = skus.map((s,i)=>({s,i})).filter(o=>active[o.s.cls]);
  const val = s => mode==="amt" ? s.cum : s.cumPct;

  let maxAbs = 100;
  list.forEach(o=>{ val(o.s).forEach(v=>{ if(Math.abs(v)>maxAbs) maxAbs=Math.abs(v); }); });
  maxAbs *= 1.08;

  const x = d => L + d/DAYS*plotW;
  const y = v => T + plotH/2 - (v/maxAbs)*(plotH/2);
  const unit = mode==="amt" ? "円" : "％";

  let g = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="inherit">`;

  // 上下ゾーンのごく薄い塗り（上＝滞留側、下＝消化側）
  g += `<rect x="${L}" y="${T}" width="${plotW}" height="${plotH/2}" fill="#B97F23" opacity="0.05"/>`;
  g += `<rect x="${L}" y="${T+plotH/2}" width="${plotW}" height="${plotH/2}" fill="#0F5132" opacity="0.04"/>`;
  g += `<text x="${W-R-6}" y="${T+16}" text-anchor="end" font-size="11" font-weight="700" fill="#B97F23">▲ 在庫が積み上がる（滞留）</text>`;
  g += `<text x="${W-R-6}" y="${T+plotH-8}" text-anchor="end" font-size="11" font-weight="700" fill="#C0392B">▼ 在庫がどんどん出る（消化速い）</text>`;

  // グリッド・軸
  [30,60,90].forEach(d=>{
    g += `<line x1="${x(d)}" y1="${T}" x2="${x(d)}" y2="${T+plotH}" stroke="#EDEDEB"/>`;
  });
  [0,30,60,90].forEach(d=>{
    g += `<text x="${x(d)}" y="${H-14}" text-anchor="middle" font-size="11" fill="#6B6B66">${d===0?"期首":d+"日"}</text>`;
  });
  for(let i=-2;i<=2;i++){
    const v = maxAbs/2*i;
    if(i!==0) g += `<line x1="${L}" y1="${y(v)}" x2="${W-R}" y2="${y(v)}" stroke="#F0F0EE"/>`;
    g += `<text x="${L-8}" y="${y(v)+4}" text-anchor="end" font-size="11" fill="#6B6B66">${(v>0?"+":"")+fmt(v)}</text>`;
  }
  // 0ライン（基準線）
  g += `<line x1="${L}" y1="${y(0)}" x2="${W-R}" y2="${y(0)}" stroke="#1C1C1A" stroke-width="1.5"/>`;
  g += `<text x="${L-8}" y="${T-8}" text-anchor="end" font-size="11" fill="#6B6B66">期首からの累積増減(${unit})</text>`;

  // 線（固定/ホバー中はそれ以外を薄く）
  const focus = pinned!==null ? pinned : hovered;
  const sorted = [...list].sort((p,q)=>(p.i===focus)-(q.i===focus)); // フォーカス線を最後（最前面）に
  sorted.forEach(o=>{
    const v = val(o.s);
    let d = "";
    v.forEach((vv,di)=>{ d += (di===0?"M":"L") + x(di).toFixed(1) + "," + y(vv).toFixed(1); });
    const isFocus = o.i===focus;
    const dim = focus!==null && !isFocus;
    g += `<path class="ln" data-i="${o.i}" d="${d}" fill="none"
      stroke="${CLS[o.s.cls].color}"
      stroke-width="${isFocus?3.2:1.6}"
      opacity="${dim?0.12:(isFocus?1:0.65)}"
      style="cursor:pointer"/>`;
    if(isFocus){
      const ex=x(DAYS), ey=y(v[DAYS]);
      g += `<circle cx="${ex}" cy="${ey}" r="4" fill="${CLS[o.s.cls].color}"/>`;
      g += `<text x="${Math.min(ex, W-R-4)}" y="${ey-8}" text-anchor="end" font-size="12" font-weight="700" fill="${CLS[o.s.cls].color}">${o.s.name}</text>`;
    }
  });
  g += `</svg>`;
  document.getElementById("chart").innerHTML = g;

  const tip = document.getElementById("tip");
  document.querySelectorAll("#chart .ln").forEach(p=>{
    p.addEventListener("mousemove", e=>{
      hovered = +p.dataset.i;
      const s = skus[hovered];
      tip.style.display="block";
      tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY+14)+"px";
      tip.innerHTML = `<b>${s.name}</b><br>分類：${CLS[s.cls].label}（${CLS[s.cls].title}）<br>累積増減：${(s.end>0?"+":"")+fmt(s.end)}円<br>1日出庫：${fmt(s.daily)}円/日<br>在庫日数：${fmtDays(s.days)}`;
      if(pinned===null) renderChart();
    });
    p.addEventListener("mouseleave", ()=>{
      tip.style.display="none";
      hovered=null;
      if(pinned===null) renderChart();
    });
    p.addEventListener("click", ()=>{
      pinned = (pinned===+p.dataset.i) ? null : +p.dataset.i;
      renderChart(); renderLists();
    });
  });
}

/* ---------- 右側リスト（上に行った順／下に行った順） ---------- */
function renderLists(){
  const list = skus.map((s,i)=>({s,i})).filter(o=>active[o.s.cls]);
  const up   = [...list].sort((p,q)=>q.s.end-p.s.end).filter(o=>o.s.end>=0).slice(0,10);
  const down = [...list].sort((p,q)=>p.s.end-q.s.end).filter(o=>o.s.end<0).slice(0,10);
  const row = o => `<li class="${o.s.cls} ${o.i===pinned?"hl":""}" data-i="${o.i}">
      <span class="nm"><b>${CLS[o.s.cls].label}</b>${o.s.name}</span>
      <span class="v">${(o.s.end>0?"+":"")+fmt(o.s.end)}円</span>
    </li>`;
  document.getElementById("list-up").innerHTML   = up.map(row).join("") || `<li><span class="nm" style="color:var(--sub)">該当なし</span></li>`;
  document.getElementById("list-down").innerHTML = down.map(row).join("") || `<li><span class="nm" style="color:var(--sub)">該当なし</span></li>`;
  document.querySelectorAll(".side li[data-i]").forEach(li=>{
    li.onclick = ()=>{ pinned = (pinned===+li.dataset.i)?null:+li.dataset.i; renderChart(); renderLists(); };
    li.onmouseenter = ()=>{ if(pinned===null){ hovered=+li.dataset.i; renderChart(); } };
    li.onmouseleave = ()=>{ if(pinned===null){ hovered=null; renderChart(); } };
  });
}

/* ---------- 金額/在庫比 切替 ---------- */
document.querySelectorAll("#mode button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("#mode button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); mode=b.dataset.m; renderChart();
  };
});

function renderAll(){ renderChips(); renderChart(); renderLists(); }
renderAll();
</script>
</body>
</html>
