        height: calc(100vh - 300px);

                </a>
            </div>

            <div class="col-span-2 grid grid-cols-3 grid-rows-3 gap-1">

    <!-- content section -->
    <div class="p-2 border border-neutral-300 bg-[#D9D9D9] rounded-md h-full drop-shadow flex-1 h-full overflow-hidden">
        <div class="grid grid-cols-7 h-full gap-2">
            <div class="col-span-1 flex flex-col h-full">

                <div class="grid grid-rows-3 gap-1">

                    <div class="row-start-2 border row-span-2 grid grid-cols-5 bg-primary-200">
                        <div class="border-r text-sm flex items-center justify-center">年</div>

            <div class="col-span-1 flex flex-col h-full">
                <!-- table header -->

                    <div class="row-start-2 border row-span-2 grid grid-cols-6 bg-primary-200">

                </div>
                <!-- table body -->

                    <div id="daily_summary_id" class="grid grid-cols-6 text-md">

            </div>
            <div class="col-span-1 flex flex-col h-full">
                <!-- table header -->
                <div class="grid grid-rows-3 gap-1">
                    <div class="py-1 bg-primary-600 rounded text-md text-white flex items-center justify-center font-bold">年月取引先別仕入集計</div>
                    <div class="row-start-2 border row-span-2 grid grid-cols-2 bg-primary-200">
                        <div class="border-r text-sm flex items-center justify-center">取引先名</div>
                        <div class="border-r text-sm flex items-center justify-center">合計税抜</div>
                    </div>
                </div>
                <!-- table body -->
                <div class="list-container">
                    <div id="summary_list_id" class="grid grid-cols-2 text-md">
                        <!-- javascript -->
                    </div>
                </div>
            </div>
            <div class="col-span-4 flex flex-col h-full">
                <!-- table header -->
                <div class="grid grid-rows-3 gap-1">
                    <div class="py-1 bg-primary-600 rounded text-md text-white flex items-center justify-center font-bold">取引先別仕入台帳</div>
                    <div class="row-start-2 border row-span-2 grid grid-cols-18 bg-primary-200">

                        <div class="col-span-1 border-r text-sm flex items-center justify-center">消費<br>税率</div>
                        <div class="col-span-1 border-r text-sm flex items-center justify-center">消費<br>税額</div>
                        <div class="col-span-2 text-sm flex items-center justify-center">税込<br>金額</div>
                    </div>
                </div>
                <!-- table body -->
                <div class="list-container">
                    <div id="sales_ledger_id" class="grid grid-cols-18 bg-white text-md">
                        <!-- javascript -->
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    window.term_product = "商品";
    window.term_label = "ラベル";
  </script>

  <!-- block script -->
  <script>
    $(document).ready(function(){
        yearList();
    });
  </script>
  <script>
    //code about calendar year
    var today = new Date();
    var setToYear = document.getElementById('current_year_id');
    var year = today.getFullYear();
    var month = today.getMonth() + 1;
    var date = today.getDate();
    var currentTime;
    currentTime = year + '-' + month + '-' + date;
    setToYear.value = year;

    $('#previous_day, #next_day').click(function(e) {
        e.preventDefault();
        setDate($(this).data('diff'));
    })

    function setDate(diff) {
        let newDate = new Date(currentTime);
        let newYear = newDate.setFullYear(newDate.getFullYear() + diff);
        let yearValue = newDate.getFullYear();
        let monthValue = newDate.getMonth() + 1;
        let dayValue = newDate.getDate();
        currentTime = yearValue + '-' + monthValue + '-' + dayValue;
        setToYear.value = yearValue;
    }

    $("#current_year_id").change(function() {
        let setDateSelect = document.getElementById('current_year_id');
        let selectDate = new Date(setDateSelect.value);
        let selectYear = selectDate.getFullYear();
        let selectMonth = selectDate.getMonth() + 1;
        let selectDay = selectDate.getDate();
        currentTime = selectYear + '-' + selectMonth + '-' + selectDay;
        setToYear.value = selectYear;
    })
  </script>

  <script>
    var divYear = '';
    var customerId = '';
    var month = '';
    var aggregationUnit = document.getElementById('aggregation_unit_id');
    var aggregationClassification = document.getElementById('classification_id');

    function yearList(){
        summaryByMonth('', '')
        summaryByAmount('', '')
        let setValueYear = setToYear.value;
        // MOCKUP: AJAX disabled — use sample data
        console.log('yearly-sales-summary (SS): mock data');
        let summaryList = document.getElementById('summary_list_data');
        summaryList.innerHTML = '';
        let sampleData = [
            {year:2026, shipping_date__month:1, total_amount:850000},
            {year:2026, shipping_date__month:2, total_amount:720000},
            {year:2026, shipping_date__month:3, total_amount:1100000},
        ];
        sampleData.forEach(function(item){
            let divTotal = document.createElement('div');
            divTotal.classList.add('div-color', 'col-span-5', 'grid', 'grid-cols-5', 'bg-white');
            divYear = document.createElement('div');
            divYear.classList.add('border-b', 'border-r', 'cursor-pointer', 'text-center', 'flex', 'items-center', 'justify-center');
            divYear.innerHTML = item.year;
            let divMonth = document.createElement('div');
            divMonth.classList.add('border-b', 'border-r', 'cursor-pointer', 'text-center', 'flex', 'items-center', 'justify-center');
            divMonth.innerHTML = item.shipping_date__month;
            let divSummary = document.createElement('div');
            divSummary.classList.add('col-span-3', 'border-b', 'border-r', 'cursor-pointer', 'text-right', 'pr-2', 'flex', 'items-center', 'justify-end');
            divSummary.innerHTML = item.total_amount.toLocaleString('en-US');
            divTotal.append(divYear, divMonth, divSummary);
            summaryList.append(divTotal);
        });
        aggregationUnit.innerHTML = '-';
        aggregationClassification.innerHTML = '-';
    }

    function summaryByMonth(yearNumber, shipMonth){
        month = shipMonth;
        // MOCKUP: AJAX disabled
        if(shipMonth == null){
            aggregationUnit.innerHTML = yearNumber + ' 年 ';
        }else{
            aggregationUnit.innerHTML = yearNumber + ' 年 ' + shipMonth + ' 月 ';
        }
        setTagColor();
    }

    function summaryByAmount(yearNumber, monthNumber){
        month = monthNumber;
        // MOCKUP: AJAX disabled
        setTagColorPrice();
    }

    function dailySalesSummary(totalAmount, year, month, date){
        let dailyAggregationUnit = document.getElementById('aggregation_unit_id');
        dailyAggregationUnit.innerHTML = month + ' 月 ' + date + ' 日';
        setTagColorByMonth();
    }

    function summaryEndDestination(numberAggregation, year, month, clientId, shippingDate){
        customerId = clientId;
        setTagColorDetail();
        setTagColorByTotalPrice();
    }
  </script>

  <script>
    function setTagColor(){
        $('#summary_list_data').on('click','.div-color',function () {
            $(this).parent().find('.div-color').removeClass('bg-primary-100');
            $(this).addClass('bg-primary-100');
        });
    }

    function setTagColorPrice(){
        $('#summary_list_data').on('dblclick','.div-color',function () {
            $(this).parent().find('.div-color').removeClass('bg-primary-100');
            $(this).addClass('bg-primary-100');
        });
    }

    function printByClient(customer){
        customerId = customer;
        $('#summary_list_id').on('click','.set-tag-print',function () {
            $(this).parent().find('.set-tag-print').removeClass('bg-primary-100');
            $(this).addClass('bg-primary-100');
        });
        flag1 = true;
        checkFlagStatus();
    }

    function setTagColorByTotalPrice(){
        $('#summary_list_id').on('click','.set-color-by-total',function () {
            $(this).parent().find('.set-color-by-total').removeClass('bg-primary-100');
            $(this).addClass('bg-primary-100');
        });
        flag1 = true;
        checkFlagStatus();
    }

    function setTagColorByMonth(){
        $('#daily_summary_id').on('click','.set-color',function () {
            $(this).parent().find('.set-color').removeClass('bg-primary-100');
            $(this).addClass('bg-primary-100');
        });
    }

    function setTagColorDetail(){
        $('#summary_list_id').on('click','.set-tag-color',function () {
            $(this).parent().find('.set-tag-color').removeClass('bg-primary-100');
            $(this).addClass('bg-primary-100');
        });
    }
  </script>

  <script>
    var flag1 = false;
    function enableButton() {
        let confirmButton1 = document.getElementById('btn_print_pdf');
        confirmButton1.classList.remove('disabled');
        confirmButton1.classList.remove('bg-gray-300', 'text-gray-500');
        confirmButton1.classList.add('bg-[#1A3A63]', 'hover:bg-[#0E2746]', 'text-white', 'cursor-pointer');
        confirmButton1.setAttribute('onclick', 'btnPrintPDF()');
    }

    function disableButton() {
        let disableBtn = document.getElementById('btn_print_pdf');
        disableBtn.classList.add('disabled');
        disableBtn.classList.add('bg-gray-300', 'text-gray-500');
        disableBtn.classList.remove('bg-[#1A3A63]', 'hover:bg-[#0E2746]', 'text-white', 'cursor-pointer');
        disableBtn.removeAttribute('onclick', '');
        disableBtn.removeAttribute('href', '');
    }

    function checkFlagStatus() {
        if (flag1 === true){
            enableButton();
        };
    };
  </script>

  <script>
    function btnPrintPDF(){
        let btnPrint = document.getElementById('btn_print_pdf');
        btnPrint.setAttribute('href', '/pdf_salse/' + parseInt(divYear.innerHTML) + '/' + month + '/' + customerId);
    }
  </script>

  <div style="position:fixed;top:8px;right:8px;background:#E60012;color:white;font-size:10px;padding:2px 8px;border-radius:2px;z-index:9999;font-weight:bold;letter-spacing:.05em;">MOCKUP</div>
</body>
