<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特別集計 — SMART STOCK [モックアップ]</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap">
  <!-- pickadate date picker CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/themes/default.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/themes/default.date.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/themes/default.time.css" />
  <style>body { font-family: 'Noto Sans JP', sans-serif; }</style>
  <!-- block style -->
  <style>
    a.disabled {
        pointer-events: none;
        cursor: default;
    }
    ::-webkit-scrollbar {
        width: 0px;
    }

    ::-webkit-scrollbar-track {
        background-color: white;
    }

    ::-webkit-scrollbar-thumb {
        background-color: #d6dee1;
        border-radius: 20px;
        border: 6px solid transparent;
        background-clip: content-box;
    }

    ::-webkit-scrollbar-thumb:hover {
        background-color: #a8bbbf;
    }
    /* SS primary カラー（ネイビー系）ZChain ブランド */
    .bg-primary-300 { background-color: #E9EEF5; }
    .bg-primary-600 { background-color: #1A3A63; }
  </style>
</head>
<body>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- block content -->
  <div class="w-full p-1 w-[1920px] h-screen overflow-hidden mx-auto bg-[#F5F5F4]">
    <!-- menu section -->
    <div class="p-2 mb-1 bg-neutral-100 border border-neutral-300">
        <div class="grid grid-cols-12 gap-1">
            <a href="#" role="button">
                <div class="text-sm bg-[#363636] hover:bg-[#727272] text-white font-bold h-full py-3 transition flex items-center justify-center">閉じる</div>
            </a>
            <div class="col-start-3 col-span-4 grid grid-cols-7 bg-white border border-neutral-300 text-xl flex items-center justify-center text-center ml-5">
                <div class="col-span-1">特</div>
                <div class="col-span-1">別</div>
                <div class="col-span-1">集</div>
                <div class="col-span-1">計</div>
                <div class="col-span-1">表</div>
                <div class="col-span-1">印</div>
                <div class="col-span-1">刷</div>
            </div>
            <div class="col-start-1 col-span-2 grid grid-cols-2 mt-5">
                <div class="col-span-2 grid ">
                    <span class="text-center bg-primary-600 py-1 text-white font-bold">取引先一覧</span>
                </div>
                <div class="col-span-2 grid">
                    <div class="grid grid-cols-6 group border text-sm bg-primary-300">
                        <div class="col-span-2 grid border-r">
                            <span class="text-center">番号</span>
                        </div>
                        <div class="col-span-4 grid">
                            <span class="text-center">取引先名</span>
                        </div>
                    </div>
                </div>
                <div id="clientdata" class="col-span-2 h-[805px] fixed-content overflow-y-auto">
                    <!-- sample client list -->
                    <div class="div-main grid grid-cols-6 group text-base bg-white">
                        <div class="col-span-2 group-hover:font-bold group-hover:bg-[#E9EEF5] cursor-pointer border-r border-b border-gray-200 text-center">2001</div>
                        <div class="col-span-4 grid">
                            <span class="group-hover:text-zinc-800 group-hover:font-bold group-hover:bg-[#E9EEF5] cursor-pointer border-r border-b border-gray-200 pl-2">サンプル仕入先株式会社</span>
                        </div>
                    </div>
                    <div class="div-main grid grid-cols-6 group text-base bg-white">
                        <div class="col-span-2 group-hover:font-bold group-hover:bg-[#E9EEF5] cursor-pointer border-r border-b border-gray-200 text-center">2002</div>
                        <div class="col-span-4 grid">
                            <span class="group-hover:text-zinc-800 group-hover:font-bold group-hover:bg-[#E9EEF5] cursor-pointer border-r border-b border-gray-200 pl-2">テスト農産株式会社</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-4 grid grid-cols-3 grid-rows-6 ml-5">
                <div class="col-span-3 mt-5">
                    <div class="grid grid-cols-12 mb-2">
                        <div class="col-span-2 bg-primary-300 text-center flex items-center justify-center">取引先</div>
                        <input id="dis_client" class="client col-span-2 bg-white text-center" data-value=" ">
                        <input id="dis_client_name" class="client col-span-5 bg-white text-center border" data-value=" ">
                    </div>
                    <div class="grid grid-cols-12 mb-2">
                        <div class="col-span-2 bg-primary-300 text-center flex items-center justify-center">期 間</div>
                        <input id="start_date" class="col-span-3 bg-white text-center" data-value=" ">
                        <div class="col-span-1 bg-primary-300 text-center flex items-center justify-center">~</div>
                        <input id="end_date" class="col-span-3 bg-white text-center border" data-value=" ">
                        <a href="#" role="button" class="col-span-3 ml-2">
                            <div class="bg-[#1A3A63] hover:bg-[#0E2746] text-white font-bold h-12 flex items-center justify-center" onclick="clientList()">抽出</div>
                        </a>
                    </div>
                </div>
                <div class="col-span-3  grid grid-cols-9">
                    <a id="btn_daily_sales" role="button" target="_blank" class="col-start-2 col-span-3 text-center h-fit border bg-neutral-100 border-neutral-300
                    py-4 flex items-center justify-center disabled">
                        取引先別<br>
                        日別売上一覧
                    </a>
                    <a id="btn_summary_by_destination" target="_blank" role="button" class="col-start-6 col-span-3 text-center h-fit border bg-neutral-100 border-neutral-300
                    py-4 flex items-center justify-center disabled">
                        持込先別<br>
                        売上集計表
                    </a>
                </div>
                <div class="col-span-3 grid grid-cols-9">
                    <a id="btn_daily_detail_by_client" target="_blank" role="button" class="col-start-2 col-span-3 text-center h-fit border bg-neutral-100 border-neutral-300
                    py-4 flex items-center justify-center disabled">
                        日別売上明細<br>
                        確認用
                    </a>
                    <a id="btn_per_account_download_csv" role="button" class="col-start-6 col-span-3 text-center h-fit border bg-[#1A3A63] hover:bg-[#0E2746] text-white font-bold cursor-pointer py-1 flex items-center justify-center" onclick="downloadCSVAllAccount(event)">
                        会計システム<br>
                        連携データ<br>
                        (全顧客データ)
                    </a>
                </div>
            </div>
        </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/picker.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/picker.date.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/picker.time.js"></script>
  <!-- datetimepicker: local static file not available in mockup, use inline fallback -->
  <script>
    window.term_product = "商品";
    window.term_label = "ラベル";
  </script>

  <!-- block script -->
  <script>
    // グローバル変数としてyear、month宣言
    var currentDate = new Date();
    var year = currentDate.getFullYear();
    var month = currentDate.getMonth() + 1;

    $(document).ready(function() {
        setCalendarFallback();
        loadSampleClients();
    });

    var displayClient = document.getElementById('dis_client');
    var displayClientName = document.getElementById('dis_client_name');

    var flag1 = false;
    var flag2 = false;

    function loadSampleClients(){
        // MOCKUP: static sample — no AJAX
    }

    function clientList(){
        // MOCKUP: AJAX disabled
    }

    // カレンダー初期値セット（datetimepicker CDN 未対応のためフォールバック）
    function setCalendarFallback(){
        flag2 = true;
        let firstDayOfMonth = new Date(year, month - 1, 1);
        let lastDayOfMonth = new Date(year, month, 0);

        function pad(n){ return n <= 9 ? '0'+n : ''+n; }
        let y = firstDayOfMonth.getFullYear();
        let m = pad(firstDayOfMonth.getMonth()+1);
        let d1 = pad(firstDayOfMonth.getDate());
        let d2 = pad(lastDayOfMonth.getDate());

        document.getElementById('start_date').value = y+'-'+m+'-'+d1;
        document.getElementById('end_date').value = y+'-'+m+'-'+d2;
        checkFlagStatus();
    }

    function setValueClient(clientId, clientName){
        displayClient.value = clientId;
        displayClientName.value = clientName;
        flag1 = true;
        setTagColorDiv();
        checkFlagStatus();
    }

    function setTagColorDiv(){
        $('#clientdata').on('click','.div-main',function () {
            $(this).parent().find('.div-main').removeClass('bg-[#E9EEF5]');
            $(this).addClass('bg-[#E9EEF5]');
        });
    }

    function checkFlagStatus(){
        if (flag1 === true && flag2 === true){
            enableButton();
        };
    };

    var btnDailyReport = document.getElementById('btn_daily_sales');
    var btnSummaryByDestination = document.getElementById('btn_summary_by_destination');
    var btnDailyDetail = document.getElementById('btn_daily_detail_by_client');

    function enableButton(){
        btnDailyReport.classList.remove('disabled');
        btnDailyReport.classList.remove('bg-neutral-100', 'border-neutral-300');
        btnDailyReport.classList.add('bg-[#1A3A63]', 'hover:bg-[#0E2746]', 'text-white', 'font-bold', 'cursor-pointer');
        btnDailyReport.setAttribute('onclick', 'summaryReport("dailySalesSummary")');

        btnSummaryByDestination.classList.remove('disabled');
        btnSummaryByDestination.classList.remove('bg-neutral-100', 'border-neutral-300');
        btnSummaryByDestination.classList.add('bg-[#1A3A63]', 'hover:bg-[#0E2746]', 'text-white', 'font-bold', 'cursor-pointer');
        btnSummaryByDestination.setAttribute('onclick', 'summaryReport("summaryByDestination")');

        btnDailyDetail.classList.remove('disabled');
        btnDailyDetail.classList.remove('bg-neutral-100', 'border-neutral-300');
        btnDailyDetail.classList.add('bg-[#1A3A63]', 'hover:bg-[#0E2746]', 'text-white', 'font-bold', 'cursor-pointer');
        btnDailyDetail.setAttribute('onclick', 'summaryReport("dailyDetailByClient")');
    }

    function disableButton(){
        btnDailyReport.classList.add('disabled');
        btnDailyReport.classList.add('bg-neutral-100', 'border-neutral-300');
        btnDailyReport.classList.remove('bg-[#1A3A63]', 'hover:bg-[#0E2746]', 'text-white', 'font-bold', 'cursor-pointer');
        btnDailyReport.removeAttribute('onclick', '');
        btnDailyReport.removeAttribute('href', '');

        btnSummaryByDestination.classList.add('disabled');
        btnSummaryByDestination.classList.add('bg-neutral-100', 'border-neutral-300');
        btnSummaryByDestination.classList.remove('bg-[#1A3A63]', 'hover:bg-[#0E2746]', 'text-white', 'font-bold', 'cursor-pointer');
        btnSummaryByDestination.removeAttribute('onclick', '');
        btnSummaryByDestination.removeAttribute('href', '');

        btnDailyDetail.classList.add('disabled');
        btnDailyDetail.classList.add('bg-neutral-100', 'border-neutral-300');
        btnDailyDetail.classList.remove('bg-[#1A3A63]', 'hover:bg-[#0E2746]', 'text-white', 'font-bold', 'cursor-pointer');
        btnDailyDetail.removeAttribute('onclick', '');
        btnDailyDetail.removeAttribute('href', '');
    }

    function summaryReport(summaryReportType){
        let valueClient = document.getElementById('dis_client').value;
        let valueStartDate = document.getElementById('start_date').value;
        let valueEndDate = document.getElementById('end_date').value;

        if(summaryReportType === 'dailySalesSummary'){
            btnDailyReport.setAttribute('href', '/daily_summary_by_client/?client_id=' + valueClient + '&start_date=' + valueStartDate + '&end_date=' + valueEndDate);
        }else if(summaryReportType === 'summaryByDestination'){
            btnSummaryByDestination.setAttribute('href', '/summary_by_destination/?client_id=' + valueClient + '&start_date=' + valueStartDate + '&end_date=' + valueEndDate);
        }else{
            btnDailyDetail.setAttribute('href', '/daily_detail_by_client/?client_id=' + valueClient + '&start_date=' + valueStartDate + '&end_date=' + valueEndDate);
        }
    }
  </script>

  <script>
    function downloadCSVAllAccount(event){
        event.preventDefault();
        // MOCKUP: CSV download disabled
        alert('モックアップ: CSVダウンロード機能はバックエンド接続時に動作します');
    }
  </script>

  <div style="position:fixed;top:8px;right:8px;background:#E60012;color:white;font-size:10px;padding:2px 8px;border-radius:2px;z-index:9999;font-weight:bold;letter-spacing:.05em;">MOCKUP</div>
</body>
</html>
