  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    window.term_product = "商品";

  <!-- block script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/picker.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/picker.date.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pickadate.js/3.5.6/compressed/picker.time.js"></script>

  <script>
    $( document ).ready(function() {
        calendar();
        mountingData();
    });

    // function show date to click next and previous day
    var days = ['日', '月', '火', '水', '木', '金', '土'];
    var setCurrentDate = document.getElementById('date_id');
    var setDay = document.getElementById('day_id');
    var currentTime;

    let today = new Date();
    let fullYear = today.getFullYear();
    let month = today.getMonth() + 1;
    let date = today.getDate();
    let currentDay = days[today.getDay()];
    let subStrYear = fullYear.toString().substr(2);

    let displayCurrentMonth;
    let displayCurrentDay;

    if(month <= 9){
        displayCurrentMonth = '0' + month;
    }else{
        displayCurrentMonth = month;
    }

    if(date <= 9){
        displayCurrentDay = '0' + date;
    }else{
        displayCurrentDay = date;
    }

    let setStartDate = subStrYear + '-' + displayCurrentMonth + '-' + displayCurrentDay;
    currentTime = fullYear + '-' + displayCurrentMonth + '-' + displayCurrentDay;
    setCurrentDate.value = setStartDate;
    setDay.value = currentDay;

    $('#previous_day, #next_day').click(function(e) {
        e.preventDefault();
        setDate($(this).data('diff'));
    })

    function setDate(diff) {
        let date = new Date(currentTime);
        let newDate = date.setDate(date.getDate() + diff);
        let year = date.getFullYear();
        let month = date.getMonth() + 1;
        let day = date.getDate();
        let newDay = days[date.getDay()];
        let subStrYear = year.toString().substr(2);

        let displayMonth;
        let displayDay;

        if(month <= 9){
            displayMonth = '0' + month;
        }else{
            displayMonth = month;
        }

        if(day <= 9){
            displayDay = '0' + day;
        }else{
            displayDay = day;
        }

        let setPreviousAndNextDate = subStrYear + '-' + displayMonth + '-' + displayDay;
        currentTime = year + '-' + displayMonth + '-' + displayDay;

        setCurrentDate.value = setPreviousAndNextDate;
        setDay.value = newDay;
    }

    $("#date_id").change(function() {
        let setDateSelect = document.getElementById('date_id');
        let selectDate = new Date(setDateSelect.value);

        let selectYear = selectDate.getFullYear();
        let selectMonth = selectDate.getMonth() + 1;
        let selectDay = selectDate.getDate();
        let weekDay = days[selectDate.getDay()];
        let subStrYear = selectYear.toString().substr(2);

        let displaySelectMonth;
        let displaySelectDay;

        if(selectMonth <= 9){
            displaySelectMonth = '0' + selectMonth;
        }else{
            displaySelectMonth = selectMonth;
        }

        if(selectDay <= 9){
            displaySelectDay = '0' + selectDay;
        }else{
            displaySelectDay = selectDay;
        }

        let setSelectDate = subStrYear + '-' + displaySelectMonth + '-' + displaySelectDay;
        currentTime = selectYear + '-' + selectMonth + '-' + selectDay;
        setCurrentDate.value = setSelectDate;
        setDay.value = weekDay;
    })

    function calendar(){
        // jQuery.datetimepicker は外部ライブラリ依存のためモックアップでは無効化
        // jQuery.datetimepicker.setLocale('ja');
        // jQuery('#date_id').datetimepicker({maxDate: today, timepicker: false, format: 'Y-m-d',});
    }
    // function add row data
    var rowCount = 1;
    function addRow(typeInput){
        let slipNumberId = document.getElementById('slip_number').value;
        let directionId = document.getElementById('direction').value;
        let terminalNameId = document.getElementById('terminal_name').value;
        let materialNameId = document.getElementById('material_name').value;
        let shapeSizeEtcId = document.getElementById('shape_size_etc').value;
        let is_ignoreID = document.getElementById('is_ignore').value;
        let workDivisionId = document.getElementById('work_division').value;
        let workPlaceId = document.getElementById('work_place').value;
        let processingDivisionId = document.getElementById('processing_division').value;
        let processingMethodId = document.getElementById('processing_method').value;

        let divDetail = document.getElementById('detail_packaging_printing');
        let newRow = document.createElement('div');
        newRow.classList.add('grid', 'grid-cols-15');
        newRow.setAttribute('id', 'div_row_' + rowCount);

        let slipNumberInput = document.createElement('input');
        slipNumberInput.classList.add('col-span-1', 'border-r', 'border-b', 'text-base', 'text-center');
        slipNumberInput.value = slipNumberId;
        newRow.appendChild(slipNumberInput);

        let directionInput = document.createElement('input');
        directionInput.classList.add('col-span-1', 'border-r', 'border-b', 'text-base', 'text-center');
        directionInput.value = directionId;
        newRow.appendChild(directionInput);

        let terminalNameInput = document.createElement('input');
        terminalNameInput.classList.add('col-span-2', 'border-r', 'border-b', 'text-base', 'pl-1');
        terminalNameInput.value = terminalNameId;
        newRow.appendChild(terminalNameInput);

        let materialNameInput = document.createElement('input');
        materialNameInput.classList.add('col-span-2', 'border-r', 'border-b', 'text-base', 'pl-1');
        materialNameInput.value = materialNameId;
        newRow.appendChild(materialNameInput);

        let shapeSizeEtcInput = document.createElement('input');
        shapeSizeEtcInput.classList.add('col-span-2', 'border-r', 'border-b', 'text-base', 'pl-1');
        shapeSizeEtcInput.value = shapeSizeEtcId;
        newRow.appendChild(shapeSizeEtcInput);

        let is_ignore_Input = document.createElement('div');
        is_ignore_Input.classList.add('col-span-1', 'border-r', 'border-b', 'text-base', 'pl-1');
        is_ignore_Input.textContent = is_ignoreID;
        newRow.appendChild(is_ignore_Input);

        let workDivisionInput = document.createElement('input');
        workDivisionInput.classList.add('col-span-1', 'border-r', 'border-b', 'text-base', 'text-center');
        workDivisionInput.setAttribute('ondblclick', 'changeNumberWorkDivision("0", ' + rowCount + ')');
        workDivisionInput.setAttribute('id', 'work_division_' + rowCount);
        workDivisionInput.setAttribute('value', '0');

        let workPlaceInput = document.createElement('input');
        workPlaceInput.classList.add('col-span-2', 'border-r', 'border-b', 'text-base', 'pl-1');
        workPlaceInput.setAttribute('id', 'work_place_' + rowCount);

        if(typeInput === 'work_division'){
            workDivisionInput.classList.add('col-span-1', 'border-r', 'border-b', 'text-base', 'text-center');
            workDivisionInput.setAttribute('ondblclick', 'changeNumberWorkDivision("0", ' + rowCount + ')');
            workDivisionInput.setAttribute('id', 'work_division_' + rowCount);
            workDivisionInput.setAttribute('value', '0');
            workPlaceInput.setAttribute('id', 'work_place_' + rowCount);
        }

        newRow.appendChild(workDivisionInput);
        newRow.appendChild(workPlaceInput);

        let processingDivisionInput = document.createElement('input');
        processingDivisionInput.classList.add('col-span-1', 'border-r', 'border-b', 'text-base', 'text-center');
        processingDivisionInput.setAttribute('ondblclick', 'changeNumberProcessingDivision("0",' + rowCount + ')');
        processingDivisionInput.setAttribute('id', 'processing_division_' + rowCount);
        processingDivisionInput.setAttribute('value', '0');

        let processingMethodInput = document.createElement('input');
        processingMethodInput.classList.add('col-span-2', 'border-r', 'border-b', 'text-base', 'pl-1');
        processingMethodInput.setAttribute('id', 'processing_method_' + rowCount);

        if(typeInput === 'processing_division'){
            processingDivisionInput.classList.add('col-span-1', 'border-r', 'border-b', 'text-base', 'text-center');
            processingDivisionInput.setAttribute('ondblclick', 'changeNumberProcessingDivision("0",' + rowCount + ')');
            processingDivisionInput.setAttribute('id', 'processing_division_' + rowCount);
            processingDivisionInput.setAttribute('value', '0');
            processingMethodInput.setAttribute('id', 'processing_method_' + rowCount);
        }

        newRow.appendChild(processingDivisionInput);
        newRow.appendChild(processingMethodInput);

        rowCount++;

        let lastRow = divDetail.lastChild;
        divDetail.insertBefore(newRow, lastRow.previousSibling);

        slip_number.value = '';
        direction.value = '';
        terminal_name.value = '';
        material_name.value = '';
        shape_size_etc.value = '';
    }

    // function change number operating division and color by number operating division of add new row
    function changeNumberWorkDivision(numberChange, workDivisionNumber){
        let divRow = document.getElementById('div_row_' + workDivisionNumber);
        let workDivisionChange = document.getElementById('work_division_' + workDivisionNumber);
        let workPlaceChange = document.getElementById('work_place_'+ workDivisionNumber);
        let processingDivisionChange = document.getElementById('processing_division_' + workDivisionNumber);

        if(numberChange === '1'){
            workDivisionChange.setAttribute('value', '9');
            workDivisionChange.classList.remove('bg-white');
            workDivisionChange.classList.add('bg-yellow-500');
            workPlaceChange.setAttribute('value', term_product);
            workPlaceChange.classList.add('text-yellow-700');
            processingDivisionChange.classList.remove('bg-white');
            processingDivisionChange.classList.add('bg-yellow-500');
            workDivisionChange.setAttribute('ondblclick', 'changeNumberWorkDivision("9",' + workDivisionNumber + ')');
        }else if(numberChange === '9'){
            workDivisionChange.setAttribute('value', '');
            workDivisionChange.classList.remove('bg-yellow-500');
            workDivisionChange.classList.add('bg-[#f8cbad]');
            workPlaceChange.setAttribute('value', '');
            processingDivisionChange.classList.remove('bg-yellow-500');
            processingDivisionChange.classList.add('bg-[#f8cbad]');
            workDivisionChange.setAttribute('ondblclick', 'changeNumberWorkDivision("blank",' + workDivisionNumber + ')');
        }else if(numberChange === 'blank'){
            workDivisionChange.setAttribute('value', '0');
            workDivisionChange.classList.remove('bg-[#f8cbad]');
            workDivisionChange.classList.add('bg-white');
            workPlaceChange.setAttribute('value', '業務');
            workPlaceChange.classList.remove('text-yellow-700');
            divRow.classList.add('text-red-500');
            processingDivisionChange.classList.remove('bg-[#f8cbad]');
            workDivisionChange.setAttribute('ondblclick', 'changeNumberWorkDivision("0",' + workDivisionNumber + ')');
        }else if(numberChange === '0'){
            workDivisionChange.setAttribute('value', '1');
            workDivisionChange.classList.remove('bg-white');
            workDivisionChange.classList.add('bg-[#f8cbad]');
            workPlaceChange.setAttribute('value', 'クリーン');
            processingDivisionChange.classList.remove('bg-white');
            processingDivisionChange.classList.add('bg-[#f8cbad]');
            divRow.classList.remove('text-red-500');
            workDivisionChange.setAttribute('ondblclick', 'changeNumberWorkDivision("1",' + workDivisionNumber + ')');
        }
    }
    // function change number processing division and color by number processing division of add new row
    function changeNumberProcessingDivision(numberChange, processingDivisionNumber){
        let processingDivisionChange = document.getElementById('processing_division_' + processingDivisionNumber);
        let processingMethodChange = document.getElementById('processing_method_' + processingDivisionNumber);

        if(numberChange === '0'){
            processingDivisionChange.setAttribute('value', '10');
            processingMethodChange.setAttribute('value', 'スライサー');
            processingDivisionChange.setAttribute('ondblclick', 'changeNumberProcessingDivision("10",' + processingDivisionNumber + ')');
        }else if(numberChange === '10'){
            processingDivisionChange.setAttribute('value', '11');
            processingMethodChange.setAttribute('value', '手切り');
            processingDivisionChange.setAttribute('ondblclick', 'changeNumberProcessingDivision("11",' + processingDivisionNumber + ')');
        }else if(numberChange === '11'){
            processingDivisionChange.setAttribute('value', '');
            processingMethodChange.setAttribute('value', '');
            processingDivisionChange.setAttribute('ondblclick', 'changeNumberProcessingDivision("blank",' + processingDivisionNumber + ')');
        }else if(numberChange === 'blank'){
            processingDivisionChange.setAttribute('value', '10');
            processingMethodChange.setAttribute('value', 'スライサー');
            processingDivisionChange.setAttribute('ondblclick', 'changeNumberProcessingDivision("10",' + processingDivisionNumber + ')');
        }
    }

    // Function to display information of all orders for each day
    // モックアップではAJAX呼び出しを無効化（サーバー接続なし）
    function mountingData(){

    // Operation division number update function
    function updateOperatingDivision(year, savingNumber, operatingNumber, endDestinationNumber, materialNumber, standardNumber, clientId){
        console.log('Double click - change operation classification value')
        let operatingDivisionId = document.getElementById('operating_division_id_' + savingNumber);
        let operatingDivisionName = document.getElementById('operating_division_name_'+ savingNumber);

        if(operatingNumber === '1'){
            operatingDivisionId.value = '9';
            operatingDivisionName.value = term_product;
        }else if(operatingNumber === '9'){
            operatingDivisionId.value = '';
            operatingDivisionName.value = '';
        }else if(operatingNumber === 'null' || operatingNumber === '' || operatingNumber === null || operatingNumber === undefined || operatingNumber === 'undefined'){
            operatingDivisionId.value = '0';
            operatingDivisionName.value = '業務';
        }else if(operatingNumber === '0'){
            operatingDivisionId.value = '1';
            operatingDivisionName.value = 'クリーン';
        }
        // モックアップではAJAX保存を無効化
    }

     // processing division number update function
    function updateProcessingDivision(year, savingNumber, processingDivisionNumber, endDestinationNumber, materialNumber, standardNumber, clientId){
        let processingDivisionId = document.getElementById('processing_division_id_' + savingNumber);
        let processingDivisionName = document.getElementById('processing_division_name_'+ savingNumber);

            processingDivisionName.value = '';

            processingDivisionName.value = 'スライサー';
        }
        // モックアップではAJAX保存を無効化
    }

    // Radio button check function, if it is true, enable print button.
    var radioValue = '';
    function selectReport(){
        let radioReportBtn = document.getElementsByName('radioReport');
        for (i = 0; i < radioReportBtn.length; i++){
            if (radioReportBtn[i].checked){
                radioValue = radioReportBtn[i].value;
                enableButton();
            };
        };
    }

    var btnReportId = document.getElementById('btn_report');
    function enableButton(){
        btnReportId.classList.remove('disabled');
        btnReportId.classList.remove('bg-yellow-200', 'border-x-yellow-300', 'border-y-yellow-400');
        btnReportId.classList.add('bg-[#ffe16a]', 'hover:bg-yellow-400', 'hover:font-bold', 'border-x-[#6a5a2a]', 'border-y-[#ffed64]', 'cursor-pointer');
        btnReportId.setAttribute('onclick', 'btnReport()');
    }

    // function to retrieve reports of each type
    function btnReport(){
        if(radioValue === '1'){
            btnReportId.setAttribute('target', '_blank');
            btnReportId.setAttribute('href', '/generate_raw_material_summary_table/?shipping_date=' + currentTime);
        }else if(radioValue === '2'){
            btnReportId.setAttribute('target', '_blank');
            btnReportId.setAttribute('href', '/generate_customer_delivery_summary_table/?shipping_date=' + currentTime);
        }else if(radioValue === '3'){
            btnReportId.setAttribute('target', '_blank');
            btnReportId.setAttribute('href', '/generate_raw_material_input_weight/?shipping_date=' + currentTime);
        }else if(radioValue === '4'){
            btnReportId.setAttribute('target', '_blank');
            btnReportId.setAttribute('href', '/generate_specific_table_missing_numbers/?shipping_date=' + currentTime);
        }
    }
  </script>
