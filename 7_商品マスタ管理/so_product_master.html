<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品マスタ管理 — SMART ORDER [モックアップ]</title>
  <!-- Tailwind CSS Play CDN (supports arbitrary values) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  <!-- Noto Sans JP -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    a.disabled { pointer-events: none; cursor: default; }
    [x-cloak] { display: none !important; }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    ::-webkit-scrollbar { width: 0px; }
    body { overflow: hidden; height: 100vh; }
    .text-highlight { color: #ff6900; font-weight: bold; display: inline-block; line-height: normal; }
    .custom-overlay-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .custom-overlay-card { padding: 2rem; width: 25rem; }
    .mat-row-visible { background-color: #ffffff; }
    .mat-row-hidden { background-color: #ECECE6; color: #6E716A; }
    .mat-row-hidden select { background-color: #F4F4EF; border-color: #E2E2DC; color: #8A8D86; }
    .vis-btn { display:inline-flex; align-items:center; gap:5px; border-radius:2px; padding:4px 10px; font-size:12px; font-weight:500; cursor:pointer; font-family:inherit; border:1px solid transparent; }
    .vis-btn.on { border-color:#0F5132; background:#EAF1EC; color:#0F5132; }
    .vis-btn.off { border-color:#C7C7C0; background:#EDEDE7; color:#82857E; }
    .mockup-badge { position:fixed; top:8px; right:8px; background:#ff6900; color:white; font-size:10px; padding:2px 8px; border-radius:2px; z-index:9999; font-weight:bold; letter-spacing:.05em; }
  </style>
</head>
<body>
  <!-- Alpine.js v3 -->
  <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>

  <div class="mockup-badge">MOCKUP · SO</div>

  <div class="p-2 h-screen bg-[#F2F3EF] overflow-hidden flex flex-col"
      x-cloak
      x-data="{AddIngredientModal: false}"
      @open-modal.window="AddIngredientModal = true"
      @close-modal.window="AddIngredientModal = false">

    <!-- header section -->
    <div class="px-4 pt-3 pb-1 flex-shrink-0">
      <a href="#" role="button" class="inline-flex items-center gap-1.5 text-sm text-[#0F5132] border border-[#0F5132] rounded px-3 py-1 hover:bg-[#EAF1EC] transition">
        <i class="fa-solid fa-caret-left text-xs"></i>戻る
      </a>
    </div>

    <!-- content section -->
    <div class="p-2 flex-1 min-h-0 overflow-hidden">
      <div class="grid grid-cols-12 gap-x-5 text-[#363636] h-full">
        <div class="bg-white flex flex-col overflow-hidden rounded drop-shadow-sm p-4 min-h-0 col-start-3 col-span-8">

          <!-- Page header -->
          <div class="px-1 pb-3 flex-shrink-0">
            <div style="font-size:11px;font-weight:500;letter-spacing:.08em;color:#0F5132;margin-bottom:2px;">受注 · SMART ORDER</div>
            <div class="flex items-center gap-2">
              <i class="fa-solid fa-carrot text-[#0F5132] text-lg"></i>
              <h1 style="font-size:18px;font-weight:500;margin:0;">商品管理</h1>
            </div>
          </div>

          <!-- Table Area -->
          <div class="flex flex-col overflow-hidden rounded h-full">
            <!-- Tab bar -->
            <div class="bg-white flex justify-between border-gray-300 py-2 flex-shrink-0">
              <div class="flex space-x-2 text-lg">
                <button id="tab_material" onclick="switchManagementTab('material')" class="font-bold my-auto text-[#0F5132] border-b-2 border-[#0F5132] px-2 pb-1 cursor-pointer transition">商品リスト</button>
                <span class="font-bold my-auto text-gray-400">|</span>
                <button id="tab_manufacturer" onclick="switchManagementTab('manufacturer')" class="font-bold my-auto text-gray-500 hover:text-[#0F5132] px-2 pb-1 cursor-pointer transition">メーカー名</button>
              </div>
            </div>

            <!-- ===== Material List Section ===== -->
            <div id="material_section" class="flex flex-col flex-grow overflow-hidden">
              <!-- Action Buttons -->
              <div class="bg-white flex justify-between py-2 flex-shrink-0">
                <div class="flex gap-2">
                  <button type="button" onclick="addMaterialModal()"
                      class="flex items-center gap-1.5 bg-[#0F5132] hover:bg-[#0a3d25] text-white font-medium py-1.5 px-3 rounded text-sm transition">
                    <i class="fa-solid fa-plus text-xs"></i>新規登録
                  </button>
                  <button type="button" onclick="alert('静的モックアップ — CSV機能は無効です')"
                      class="flex items-center gap-1.5 bg-white hover:bg-[#EAF1EC] text-[#0F5132] font-medium py-1.5 px-3 border border-[#0F5132] rounded text-sm transition">
                    <i class="fa-solid fa-download text-xs"></i>CSVダウンロード
                  </button>
                  <input type="file" id="csv_upload_input" accept=".csv" class="hidden">
                  <button type="button" onclick="alert('静的モックアップ — CSV機能は無効です')"
                      class="flex items-center gap-1.5 bg-white hover:bg-[#EAF1EC] text-[#0F5132] font-medium py-1.5 px-3 border border-[#0F5132] rounded text-sm transition">
                    <i class="fa-solid fa-upload text-xs"></i>CSVアップロード
                  </button>
                </div>
              </div>

              <!-- Search bar (jan_support ON) -->
              <div class="flex justify-between pb-2 flex-shrink-0">
                <div class="flex gap-2">
                  <div class="relative flex items-center">
                    <input type="text" id="material_search" oninput="filterMaterialList()" placeholder="商品名/JAN検索"
                        class="w-[300px] px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#0F5132] transition-all">
                  </div>
                  <select id="manufacturer_search" onchange="filterMaterialList()"
                      class="py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#0F5132] transition-all cursor-pointer">
                    <option value="">メーカー名を選択</option>
                    <option value="1">田中食品</option>
                    <option value="2">鈴木農産</option>
                    <option value="3">山田フーズ</option>
                  </select>
                </div>
                <div id="material_header_actions" class="flex my-auto gap-x-2">
                  <select id="view_mode" onchange="filterMaterialList()" class="py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-[#0F5132] transition-all cursor-pointer">
                    <option value="all" selected>全て</option>
                    <option value="show">表示</option>
                    <option value="hidden">非表示</option>
                  </select>
                </div>
              </div>

              <!-- Table Header -->
              <div class="grid grid-cols-12 bg-[#0F5132] text-white flex-shrink-0">
                <div class="col-span-1 font-bold py-2 flex justify-center items-center cursor-pointer hover:bg-[#0a3d25] transition select-none" onclick="toggleIdSort()" title="クリックして並び替え">
                  ID <span id="id_sort_icon" class="ml-1 text-xs">▲</span>
                </div>
                <div class="col-span-3 font-bold flex justify-center items-center">商品名</div>
                <div class="col-span-3 font-bold flex justify-center items-center">読み/JAN</div>
                <div class="col-span-3 font-bold flex justify-center items-center">メーカー名</div>
                <div class="col-span-2 font-bold flex justify-center items-center">
                  <i class="fa-solid fa-arrows-left-right"></i>
                </div>
              </div>

              <!-- Table Content (populated by JS) -->
              <div class="flex-1 min-h-0 bg-white overflow-y-auto w-full">
                <div id="material_list" class="border-b w-full"></div>
              </div>
            </div>

            <!-- ===== Manufacturer Section ===== -->
            <div id="manufacturer_section" class="mt-2 flex flex-col flex-grow hidden overflow-hidden">
              <div class="flex flex-col w-full h-full">
                <!-- Input & action buttons -->
                <div class="flex items-center justify-between py-2 border-b flex-shrink-0">
                  <div class="flex items-center gap-2">
                    <input id="new_manufacturer_input" type="text" class="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-[#0F5132] w-64" placeholder="新しいメーカー名を入力">
                    <button type="button" onclick="addManufacturerMock()" class="text-white bg-[#0F5132] hover:bg-[#0a3d25] rounded px-4 py-1 text-sm font-bold transition whitespace-nowrap">追加</button>
                  </div>
                  <div class="flex items-center gap-2">
                    <button type="button" onclick="alert('静的モックアップ — CSV機能は無効です')"
                        class="flex items-center gap-1.5 bg-white hover:bg-[#EAF1EC] text-[#0F5132] font-medium py-1.5 px-3 border border-[#0F5132] rounded text-sm transition">
                      <i class="fa-solid fa-download text-xs"></i>CSVダウンロード
                    </button>
                    <input type="file" id="mfg_csv_upload_input" accept=".csv" class="hidden">
                    <button type="button" onclick="alert('静的モックアップ — CSV機能は無効です')"
                        class="flex items-center gap-1.5 bg-white hover:bg-[#EAF1EC] text-[#0F5132] font-medium py-1.5 px-3 border border-[#0F5132] rounded text-sm transition">
                      <i class="fa-solid fa-upload text-xs"></i>CSVアップロード
                    </button>
                  </div>
                </div>

                <!-- Manufacturer Table Header -->
                <div class="grid grid-cols-12 bg-[#0F5132] text-white w-full flex-shrink-0">
                  <div class="col-span-1 font-bold py-2 flex justify-center items-center border-r border-[#1a6942]">ID</div>
                  <div class="col-span-8 font-bold flex justify-center items-center border-r border-[#1a6942]">メーカー名</div>
                  <div class="col-span-3 font-bold flex justify-center items-center">操作</div>
                </div>

                <!-- Manufacturer Table Content -->
                <div class="flex-1 min-h-0 bg-white overflow-y-auto w-full">
                  <div id="manufacturer_list" class="border-b w-full">
                    <div id="manufacturer_table_body" class="w-full"></div>
                  </div>
                </div>
              </div>
            </div>

          </div><!-- /Table Area -->
        </div>
      </div>
    </div>

    <!-- ===== New Material Modal ===== -->
    <div class="fixed z-10 inset-0 overflow-y-auto"
        x-show="AddIngredientModal"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 transform"
        x-transition:enter-end="opacity-100 transform"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 transform"
        x-transition:leave-end="opacity-0 transform"
        x-cloak
        aria-labelledby="modal-title" role="dialog" aria-modal="true">
      <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div
          x-show="AddIngredientModal"
          @click.outside="AddIngredientModal = false"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 transform scale-95"
          x-transition:enter-end="opacity-100 transform scale-100"
          x-transition:leave="transition ease-in duration-75"
          x-transition:leave-start="opacity-100 transform scale-200"
          x-transition:leave-end="opacity-0 transform scale-95"
          x-cloak
          class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
          <div class="bg-[#E9E5DB]">
            <!-- Modal Header -->
            <div class="grid grid-cols-3 px-5 pt-3">
              <div class="col-span-2 w-full my-auto">
                <h3 class="text-lg leading-6 text-left font-bold" id="modal-title">商品登録</h3>
              </div>
              <div class="col-start-3 col-span-1 text-right w-full my-auto pr-2">
                <i class="fa-solid fa-xmark fa-xl hover:text-red-600 cursor-pointer" @click="AddIngredientModal = false"></i>
              </div>
            </div>
            <!-- Modal Content -->
            <div class="px-14">
              <form class="flex flex-col" onsubmit="return false">
                <div class="grid grid-cols-10 text-sm pt-3">
                  <div class="col-span-2 text-sm ml-1">ID</div>
                  <div class="col-span-4 text-sm ml-1">商品名</div>
                  <div class="col-span-4 text-sm ml-1">読み/JAN</div>
                  <div class="col-span-10 grid grid-cols-10">
                    <input id="new_material_id" class="col-span-2 text-base rounded-l-md py-2 text-center border-r border-slate-300 focus:outline-none" autocomplete="off" placeholder="ID">
                    <input id="new_material_name" class="col-span-4 text-base px-3 py-2 border-r border-slate-300 focus:outline-none" autocomplete="off" placeholder="商品名">
                    <input id="new_material_yomi" class="col-span-4 text-base rounded-r-md px-3 py-2 focus:outline-none" autocomplete="off" placeholder="読み/JAN">
                  </div>
                </div>
                <div id="infoArea" class="text-center text-sm mt-2"></div>
                <div id="sameMatArea" class="text-center text-sm"></div>
              </form>
            </div>
            <!-- Modal Footer -->
            <div class="grid grid-cols-6 px-14 py-5">
              <button type="button" onclick="addMaterialMock()" class="col-start-5 col-span-2 w-full rounded-md shadow-sm py-2 bg-[#0F5132] hover:bg-[#1a6942] font-bold text-base text-white transition">
                追加
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CSV Loading Overlay -->
    <div id="csv_loading_overlay" class="fixed inset-0 z-50 hidden custom-overlay-bg flex flex-col items-center justify-center transition-all duration-300">
      <div class="custom-overlay-card flex flex-col items-center transform transition-all">
        <div class="relative w-16 h-16 mb-6">
          <svg class="animate-spin absolute inset-0 w-full h-full text-[#0F5132]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
            <path class="opacity-100" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="h-5 w-5 bg-[#0F5132] rounded-full animate-pulse opacity-80"></div>
          </div>
        </div>
        <p class="text-black font-extrabold text-2xl tracking-wider">CSVアップロード中。。。</p>
        <div class="w-12 h-1 bg-gradient-to-r from-transparent via-[#0F5132] to-transparent my-3 opacity-50"></div>
        <p class="text-sm text-black font-xl text-center leading-relaxed">データを処理しています。<br>しばらくお待ちください。</p>
      </div>
    </div>

  </div><!-- /root x-data div -->

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
    // --- Mockup stubs ---
    const janSupport = true;
    const term_product = '商品';

    // --- Sample data ---
    var materialObjLsit = [
      {fields:{material_id:1, material_name:'トマト',     material_pronunciation:'tomato',       manufacturer:1, is_hidden:false}},
      {fields:{material_id:2, material_name:'レタス',     material_pronunciation:'lettuce',      manufacturer:1, is_hidden:false}},
      {fields:{material_id:3, material_name:'玉ねぎ',     material_pronunciation:'tamanegi',     manufacturer:2, is_hidden:false}},
      {fields:{material_id:4, material_name:'にんじん',   material_pronunciation:'ninjin',       manufacturer:2, is_hidden:false}},
      {fields:{material_id:5, material_name:'きゅうり',   material_pronunciation:'4901234567890',manufacturer:3, is_hidden:false}},
      {fields:{material_id:6, material_name:'ピーマン',   material_pronunciation:'piiman',       manufacturer:null, is_hidden:true}},
      {fields:{material_id:7, material_name:'ほうれん草', material_pronunciation:'hourensou',    manufacturer:3, is_hidden:false}},
      {fields:{material_id:8, material_name:'キャベツ',   material_pronunciation:'4902088000000',manufacturer:2, is_hidden:true}},
      {fields:{material_id:9, material_name:'じゃがいも', material_pronunciation:'jagaimo',      manufacturer:1, is_hidden:false}},
      {fields:{material_id:10,material_name:'大根',       material_pronunciation:'daikon',       manufacturer:3, is_hidden:false}},
    ];

    var SAMPLE_MANUFACTURERS = [
      {id:1, manufacturer_name:'田中食品'},
      {id:2, manufacturer_name:'鈴木農産'},
      {id:3, manufacturer_name:'山田フーズ'},
    ];

    var currentManufacturers = SAMPLE_MANUFACTURERS;
    var idSortOrder = localStorage.getItem('material_id_sort_order') || 'asc';

    $(document).ready(function() {
      let sortIcon = document.getElementById('id_sort_icon');
      if (sortIcon) { sortIcon.innerHTML = idSortOrder === 'asc' ? '▲' : '▼'; }
      filterMaterialList();
      renderManufacturerTable();
    });

    function toggleIdSort() {
      idSortOrder = idSortOrder === 'asc' ? 'desc' : 'asc';
      localStorage.setItem('material_id_sort_order', idSortOrder);
      let sortIcon = document.getElementById('id_sort_icon');
      if (sortIcon) { sortIcon.innerHTML = idSortOrder === 'asc' ? '▲' : '▼'; }
      filterMaterialList();
    }

    function filterMaterialList() {
      let searchInput = document.getElementById('material_search');
      let mfgSelect   = document.getElementById('manufacturer_search');
      let viewMode    = document.getElementById('view_mode');

      let query = searchInput ? searchInput.value.toLowerCase() : '';
      let selectedMfgId = mfgSelect ? mfgSelect.value : '';
      let viewVal = viewMode ? viewMode.value : 'all';

      let filteredList = materialObjLsit.filter(function(item) {
        let name   = (item.fields.material_name || '').toLowerCase();
        let yomi   = (item.fields.material_pronunciation || '').toLowerCase();
        let matchText = name.includes(query) || (janSupport && yomi.includes(query));
        let matchMfg  = selectedMfgId === '' || String(item.fields.manufacturer) === selectedMfgId;
        let matchVis  = viewVal === 'all' || (viewVal === 'show' && !item.fields.is_hidden) || (viewVal === 'hidden' && item.fields.is_hidden);
        return matchText && matchMfg && matchVis;
      });

      filteredList.sort(function(a, b) {
        let idA = parseInt(a.fields.material_id);
        let idB = parseInt(b.fields.material_id);
        return idSortOrder === 'asc' ? idA - idB : idB - idA;
      });

      renderMaterialTable(filteredList, currentManufacturers, query);
    }

    function highlightText(text, keyword) {
      if (!keyword || !text) return text;
      const esc = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp('(' + esc + ')', 'gi'), '<span class="text-highlight">$1</span>');
    }

    function renderMaterialTable(list, manufacturers, query) {
      query = query || '';
      let divMaterialList = document.getElementById('material_list');
      divMaterialList.innerHTML = '';

      var EYE_SVG    = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5"/><path d="M2 12c2.5-4.5 6-6.8 10-6.8s7.5 2.3 10 6.8c-2.5 4.5-6 6.8-10 6.8S4.5 16.5 2 12z"/></svg>';
      var EYEOFF_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"/><path d="M16.7 16.7A9 9 0 0 1 12 18.8c-4 0-7.5-2.3-10-6.8a16 16 0 0 1 4.4-5M9.6 5.4A9 9 0 0 1 12 5.2c4 0 7.5 2.3 10 6.8a16 16 0 0 1-2.3 3.1"/><path d="M3 3l18 18"/></svg>';

      for (let id in list) {
        let item   = list[id];
        let fields = item.fields;
        let materialId = fields.material_id;

        let mainDiv = document.createElement('div');
        mainDiv.classList.add('grid', 'grid-cols-12', 'border-b');

        // ID column
        let divId = document.createElement('div');
        divId.classList.add('col-span-1','text-center','py-2','border-r','flex','justify-center','items-center');
        divId.innerHTML = materialId;

        // Name column
        let divName = document.createElement('div');
        divName.classList.add('col-span-3','text-left','border-r','px-2','py-2','break-all');
        divName.innerHTML = highlightText(fields.material_name, query);

        // Pronunciation/JAN column (click-to-edit)
        let divYomi = document.createElement('div');
        divYomi.classList.add('col-span-3','text-left','border-r','px-2','py-2','break-all','cursor-pointer','relative');
        let spanYomi = document.createElement('span');
        spanYomi.classList.add('w-full','inline-block');
        spanYomi.innerHTML = highlightText(fields.material_pronunciation, query) || '<span class="text-gray-300 italic">-</span>';
        let inputYomi = document.createElement('input');
        inputYomi.classList.add('hidden','text-left','w-full','border','border-[#0F5132]','rounded','focus:outline-none');
        inputYomi.value = fields.material_pronunciation || '';
        divYomi.append(spanYomi, inputYomi);
        divYomi.onclick = function() {
          if (inputYomi.classList.contains('hidden')) {
            spanYomi.classList.add('hidden'); inputYomi.classList.remove('hidden'); inputYomi.focus();
          }
        };
        inputYomi.onblur  = function() { spanYomi.classList.remove('hidden'); inputYomi.classList.add('hidden'); };
        inputYomi.onkeydown = function(e) { if (e.key === 'Enter' || e.key === 'Escape') inputYomi.blur(); };

        // Manufacturer select
        let divMfg = document.createElement('div');
        divMfg.classList.add('col-span-3','border-r','flex','justify-center','items-center','px-2');
        let selectMfg = document.createElement('select');
        selectMfg.classList.add('w-full','py-1','text-sm','border','border-gray-300','rounded','focus:outline-none');
        let emptyOpt = document.createElement('option');
        emptyOpt.value = ''; emptyOpt.text = '---';
        selectMfg.appendChild(emptyOpt);
        manufacturers.forEach(function(mfg) {
          let opt = document.createElement('option');
          opt.value = mfg.id; opt.text = mfg.manufacturer_name;
          if (fields.manufacturer === mfg.id) opt.selected = true;
          selectMfg.appendChild(opt);
        });
        divMfg.append(selectMfg);

        // Visibility toggle
        let divAction = document.createElement('button');
        divAction.classList.add('col-span-2','flex','justify-center','items-center','my-auto','vis-btn');
        if (!fields.is_hidden) {
          divAction.classList.add('on');
          divAction.innerHTML = EYE_SVG + '<span>表示</span>';
          divAction.onclick = function() { setMatVisible(materialId, true); };
          mainDiv.classList.add('mat-row-visible');
          mainDiv.style.borderLeft = '3px solid #0F5132';
        } else {
          divAction.classList.add('off');
          divAction.innerHTML = EYEOFF_SVG + '<span>非表示</span>';
          divAction.onclick = function() { setMatVisible(materialId, false); };
          mainDiv.classList.add('mat-row-hidden');
          mainDiv.style.borderLeft = '3px solid #D5D5CF';
        }

        mainDiv.append(divId, divName, divYomi, divMfg, divAction);
        divMaterialList.append(mainDiv);
      }
    }

    function setMatVisible(materialId, currentlyVisible) {
      let idx = materialObjLsit.findIndex(function(item) { return item.fields.material_id === materialId; });
      if (idx !== -1) {
        materialObjLsit[idx].fields.is_hidden = currentlyVisible;
        filterMaterialList();
      }
    }

    function renderManufacturerTable() {
      const tbody = document.getElementById('manufacturer_table_body');
      tbody.innerHTML = '';
      SAMPLE_MANUFACTURERS.forEach(function(m) {
        const newRow = document.createElement('div');
        newRow.className = 'grid grid-cols-12 bg-white border-b hover:bg-gray-50';
        newRow.id = 'manufacturer_row_' + m.id;
        newRow.innerHTML =
          '<div class="col-span-1 py-2 font-medium text-gray-900 flex justify-center items-center">' + m.id + '</div>' +
          '<div class="col-span-8 py-2 px-4 flex items-center">' +
            '<span id="manufacturer_name_display_' + m.id + '" class="w-full">' + m.manufacturer_name + '</span>' +
            '<input type="text" id="manufacturer_name_input_' + m.id + '" class="hidden border border-gray-300 rounded px-2 py-1 w-full text-sm focus:outline-none focus:ring-1 focus:ring-[#0F5132]" value="' + m.manufacturer_name + '">' +
          '</div>' +
          '<div class="col-span-3 py-2 flex justify-center items-center text-[#363636]">' +
            '<button id="btn_edit_' + m.id + '" type="button" onclick="enableEditManufacturer(\'' + m.id + '\')" class="font-medium text-[#363636] hover:underline mr-4">修正</button>' +
            '<button id="btn_save_' + m.id + '" type="button" onclick="saveManufacturerMock(\'' + m.id + '\')" class="hidden font-medium text-[#0F5132] hover:underline mr-4">保存</button>' +
            '<button id="btn_cancel_' + m.id + '" type="button" onclick="cancelEditManufacturer(\'' + m.id + '\')" class="hidden font-medium text-gray-600 hover:underline mr-4">取消</button>' +
            '<button type="button" onclick="deleteManufacturerMock(\'' + m.id + '\')" class="font-medium text-[#CC0000] hover:underline">削除</button>' +
          '</div>';
        tbody.appendChild(newRow);
      });
    }

    function switchManagementTab(tabName) {
      const matBtn = document.getElementById('tab_material');
      const mfgBtn = document.getElementById('tab_manufacturer');
      const matSec = document.getElementById('material_section');
      const mfgSec = document.getElementById('manufacturer_section');
      const headerActions = document.getElementById('material_header_actions');

      if (tabName === 'material') {
        filterMaterialList();
        matBtn.classList.add('text-[#0F5132]','border-b-2','border-[#0F5132]');
        matBtn.classList.remove('text-gray-500','hover:text-[#0F5132]');
        mfgBtn.classList.remove('text-[#0F5132]','border-b-2','border-[#0F5132]');
        mfgBtn.classList.add('text-gray-500','hover:text-[#0F5132]');
        matSec.classList.remove('hidden'); mfgSec.classList.add('hidden');
        if (headerActions) headerActions.classList.remove('hidden');
      } else {
        mfgBtn.classList.add('text-[#0F5132]','border-b-2','border-[#0F5132]');
        mfgBtn.classList.remove('text-gray-500','hover:text-[#0F5132]');
        matBtn.classList.remove('text-[#0F5132]','border-b-2','border-[#0F5132]');
        matBtn.classList.add('text-gray-500','hover:text-[#0F5132]');
        mfgSec.classList.remove('hidden'); matSec.classList.add('hidden');
        if (headerActions) headerActions.classList.add('hidden');
      }
    }

    function addMaterialModal() {
      let nextId = materialObjLsit.length > 0
        ? Math.max.apply(null, materialObjLsit.map(function(i){ return i.fields.material_id; })) + 1
        : 1;
      document.getElementById('new_material_id').value   = nextId;
      document.getElementById('new_material_name').value = '';
      document.getElementById('new_material_yomi').value = '';
      document.getElementById('infoArea').innerHTML   = '';
      document.getElementById('sameMatArea').innerHTML = '';
      window.dispatchEvent(new Event('open-modal'));
    }

    function addMaterialMock() {
      let newId   = parseInt(document.getElementById('new_material_id').value);
      let newName = document.getElementById('new_material_name').value.trim();
      let newYomi = document.getElementById('new_material_yomi').value.trim();
      if (!newId || !newName) {
        document.getElementById('infoArea').innerHTML = '<span class="text-red-500 text-sm">IDと商品名は必須です</span>';
        return;
      }
      if (materialObjLsit.find(function(i){ return i.fields.material_id === newId; })) {
        document.getElementById('infoArea').innerHTML = '<span class="text-red-500 text-sm">そのIDはすでに存在します</span>';
        return;
      }
      materialObjLsit.push({fields:{material_id:newId, material_name:newName, material_pronunciation:newYomi, manufacturer:null, is_hidden:false}});
      filterMaterialList();
      window.dispatchEvent(new Event('close-modal'));
    }

    function enableEditManufacturer(id) {
      document.getElementById('manufacturer_name_display_' + id).classList.add('hidden');
      document.getElementById('manufacturer_name_input_'   + id).classList.remove('hidden');
      document.getElementById('btn_edit_'   + id).classList.add('hidden');
      document.getElementById('btn_save_'   + id).classList.remove('hidden');
      document.getElementById('btn_cancel_' + id).classList.remove('hidden');
    }

    function cancelEditManufacturer(id) {
      document.getElementById('manufacturer_name_display_' + id).classList.remove('hidden');
      document.getElementById('manufacturer_name_input_'   + id).classList.add('hidden');
      const displayVal = document.getElementById('manufacturer_name_display_' + id).innerText;
      document.getElementById('manufacturer_name_input_' + id).value = displayVal;
      document.getElementById('btn_edit_'   + id).classList.remove('hidden');
      document.getElementById('btn_save_'   + id).classList.add('hidden');
      document.getElementById('btn_cancel_' + id).classList.add('hidden');
    }

    function saveManufacturerMock(id) {
      const name = document.getElementById('manufacturer_name_input_' + id).value.trim();
      if (!name) { alert('製造会社名を入力してください。'); return; }
      document.getElementById('manufacturer_name_display_' + id).innerText = name;
      let mfg = SAMPLE_MANUFACTURERS.find(function(m){ return String(m.id) === String(id); });
      if (mfg) mfg.manufacturer_name = name;
      cancelEditManufacturer(id);
    }

    function deleteManufacturerMock(id) {
      if (confirm('本当に削除しますか？')) {
        document.getElementById('manufacturer_row_' + id).remove();
        SAMPLE_MANUFACTURERS = SAMPLE_MANUFACTURERS.filter(function(m){ return String(m.id) !== String(id); });
        currentManufacturers = SAMPLE_MANUFACTURERS;
      }
    }

    function addManufacturerMock() {
      const input = document.getElementById('new_manufacturer_input');
      const name  = input.value.trim();
      if (!name) { alert('メーカー名を入力してください。'); return; }
      const newId = SAMPLE_MANUFACTURERS.length > 0
        ? Math.max.apply(null, SAMPLE_MANUFACTURERS.map(function(m){ return m.id; })) + 1
        : 1;
      SAMPLE_MANUFACTURERS.push({id: newId, manufacturer_name: name});
      currentManufacturers = SAMPLE_MANUFACTURERS;
      renderManufacturerTable();
      input.value = '';
    }
  </script>
</body>
</html>
